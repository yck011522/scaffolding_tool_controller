; PlatformIO configuration for Scaffolding Tool Controller
; Board: Seeed Studio XIAO ESP32-S3 Sense

[platformio]
default_envs = xiao_esp32s3

; ── Shared settings ─────────────────────────────────────────────────
[env]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; ── Main firmware ───────────────────────────────────────────────────
[env:xiao_esp32s3]
; src/main.cpp — integrated controller firmware

; ── Individual component tests ──────────────────────────────────────
; Build a specific test with:  pio run -e test_bldc_pwm
; Upload with:                 pio run -e test_bldc_pwm -t upload
; Monitor with:                pio device monitor

[env:test_bldc_pwm]
src_dir = test/test_bldc_pwm

[env:test_bldc_feedback]
src_dir = test/test_bldc_feedback

[env:test_ina_current]
src_dir = test/test_ina_current

[env:test_rs485]
src_dir = test/test_rs485

[env:test_oled]
src_dir = test/test_oled

[env:test_buttons]
src_dir = test/test_buttons

[env:test_camera]
src_dir = test/test_camera
